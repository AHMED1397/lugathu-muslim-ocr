name: OCR Background Cleaner
on:
  workflow_dispatch:

jobs:
  clean-task:
    runs-on: ubuntu-latest
    # This line opts you into the new Node.js 24 version now to stop the warning
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # This is actually fine, but we use the env above

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Gemini Library
        run: |
          pip install google-genai

      - name: Run The Script
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python cleaner.py

      - name: Save Result
        uses: actions/upload-artifact@v4
        with:
          name: cleaned-text-file
          path: cleaned_full.txt
